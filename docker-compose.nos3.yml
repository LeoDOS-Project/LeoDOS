# NOS3 multi-satellite wildfire demo.
#
# Usage:
#   make demo-build    # build Docker image + sims + FSW
#   make demo-up       # generate configs + launch
#   make demo-down     # stop everything

x-nos3-common: &nos3-common
  image: nos3-rust:latest
  networks:
    - nos3

services:
  # NOS Engine message bus server.
  # Routes messages between FSW and simulators over TCP.
  nos-engine-server:
    <<: *nos3-common
    hostname: nos-engine-server
    container_name: nos-engine-server
    stdin_open: true
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: /usr/bin/nos_engine_server_standalone -f nos_engine_server_config.json

  # 42 orbital dynamics simulator.
  # Provides truth data (attitude, position, sun vector, mag field)
  # to component simulators via TCP sockets.
  fortytwo:
    <<: *nos3-common
    hostname: fortytwo
    container_name: nos3-fortytwo
    volumes:
      - ${NOS3_USER_DIR:-~/.nos3}:${NOS3_USER_DIR:-/root/.nos3}
    working_dir: ${NOS3_USER_DIR:-/root/.nos3}/42
    command: ./42 NOS3InOut
    depends_on:
      - nos-engine-server
      - sims

  # All simulators (time, truth, GPS×N, camera×N).
  sims:
    <<: *nos3-common
    hostname: nos3-sims
    container_name: nos3-sims
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
      - ./tools/eosim/output:/sim/thermal_data:ro
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: sh -c "sleep 5 && ./nos3-simulator-terminal -f nos3-simulator.xml"
    depends_on:
      - nos-engine-server

  # Flight software — launches N cFS processes (one per satellite).
  fsw:
    <<: *nos3-common
    hostname: nos-fsw
    container_name: nos3-fsw
    volumes:
      - .:/cFS
    working_dir: /cFS/libs/nos3/fsw/build/exe/cpu1
    environment:
      - LD_LIBRARY_PATH=/cFS/libs/nos3/fsw/build/exe/cpu1:/cFS/libs/nos3/fsw/build/exe/cpu1/cf:/usr/lib:/usr/local/lib
      - LD_PRELOAD=/cFS/libs/nos3/fsw/build/exe/cpu1/cf/novatel_oem615.so
      - CFE_DIR=/cFS/cfe
      - OSAL_DIR=/cFS/osal
      - PSP_DIR=/cFS/psp
      - BUILD_DIR=/cFS/build
      - HWLIB_DIR=/cFS/libs/nos3/fsw/apps/hwlib
      - NOS3_COMPONENTS_DIR=/cFS/libs/nos3/components
      - MAX_ORB=${MAX_ORB:-3}
      - MAX_SAT=${MAX_SAT:-3}
    command: >-
      bash -c '
        BASE=$$(pwd); pids=();
        for orb in $$(seq 0 $$((MAX_ORB - 1))); do
          for sat in $$(seq 1 $$MAX_SAT); do
            SCID=$$(( (orb + 1) * 1000 + sat ));
            INST=/cFS/run/sat_$$SCID;
            mkdir -p $$INST && cp -a $$BASE/. $$INST/;
            echo "Launching SCID=$$SCID";
            (cd $$INST && ./core-cpu1 --scid $$SCID) &
            pids+=($$!);
          done;
        done;
        trap "kill $${pids[*]} 2>/dev/null; wait" SIGTERM SIGINT;
        wait'
    sysctls:
      - fs.mqueue.msg_max=10000
    ulimits:
      rtprio: 99
    cap_add:
      - SYS_NICE
    depends_on:
      - nos-engine-server
      - sims

networks:
  nos3:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.41.0/24
          gateway: 192.168.41.1
