# NOS3 simulation environment.
#
# Runs the NOS Engine server, component simulators, and
# Rust-based flight software in a connected Docker network.
#
# Usage:
#   make nos3-prep     # pull image, build nos3 Docker image
#   make nos3-config   # generate NOS3 build configuration
#   make nos3-build    # build simulators + flight software
#   make nos3-launch   # start all containers
#   make nos3-stop     # stop all containers

x-nos3-common: &nos3-common
  image: nos3-rust:latest
  networks:
    - nos3

services:
  # NOS Engine message bus server.
  # Routes messages between FSW and simulators over TCP.
  nos-engine-server:
    <<: *nos3-common
    hostname: nos-engine-server
    container_name: nos-engine-server
    stdin_open: true
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: /usr/bin/nos_engine_server_standalone -f nos_engine_server_config.json

  # 42 orbital dynamics simulator.
  # Provides truth data (attitude, position, sun vector, mag field)
  # to component simulators via TCP sockets.
  fortytwo:
    <<: *nos3-common
    hostname: fortytwo
    container_name: nos3-fortytwo
    volumes:
      - ${NOS3_USER_DIR:-~/.nos3}:${NOS3_USER_DIR:-/root/.nos3}
    working_dir: ${NOS3_USER_DIR:-/root/.nos3}/42
    command: ./42 NOS3InOut
    depends_on:
      - nos-engine-server
      - time-driver

  # Truth data provider — connects to 42 for orbital state.
  truth42sim:
    <<: *nos3-common
    hostname: truth42sim
    container_name: nos3-truth42sim
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: sh -c "sleep 10 && ./nos3-single-simulator -f nos3-simulator.xml -s truth42sim"
    depends_on:
      - nos-engine-server
      - fortytwo

  # GPS simulator.
  gps-sim:
    <<: *nos3-common
    hostname: gps-sim
    container_name: nos3-gps-sim
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: sh -c "sleep 10 && ./nos3-single-simulator -f nos3-simulator.xml -s gps"
    depends_on:
      - nos-engine-server
      - truth42sim

  # Thermal camera simulator.
  thermal-cam-sim:
    <<: *nos3-common
    hostname: thermal-cam-sim
    container_name: nos3-thermal-cam-sim
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
      - ./tools/eosim/output:/sim/thermal_data:ro
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: sh -c "sleep 10 && ./nos3-single-simulator -f nos3-simulator.xml -s thermal-cam-sim"
    depends_on:
      - nos-engine-server
      - truth42sim

  # NOS3 time driver — starts after NOS Engine, before 42.
  # Drives the simulation clock; 42 blocks until ticks arrive.
  time-driver:
    <<: *nos3-common
    hostname: nos-time-driver
    container_name: nos3-time-driver
    environment:
      - TERM=xterm
    volumes:
      - ./libs/nos3/sims/build:${SIM_DIR:-/cFS/libs/nos3/sims/build}
    working_dir: ${SIM_DIR:-/cFS/libs/nos3/sims/build}/bin
    command: ./nos3-single-simulator -f nos3-simulator.xml -s time
    depends_on:
      - nos-engine-server

  # Flight software (cFS with Rust apps).
  # Built with NOS3 toolchain — hwlib routes bus calls
  # through NOS Engine to the simulators.
  fsw:
    <<: *nos3-common
    hostname: nos-fsw
    container_name: nos3-fsw
    volumes:
      - .:/cFS
    working_dir: /cFS/libs/nos3/fsw/build/exe/cpu1
    environment:
      - LD_LIBRARY_PATH=/cFS/libs/nos3/fsw/build/exe/cpu1:/usr/lib:/usr/local/lib
      - CFE_DIR=/cFS/cfe
      - OSAL_DIR=/cFS/osal
      - PSP_DIR=/cFS/psp
      - BUILD_DIR=/cFS/build
      - HWLIB_DIR=/cFS/libs/nos3/fsw/apps/hwlib
      - NOS3_COMPONENTS_DIR=/cFS/libs/nos3/components
    command: ./core-cpu1 -R PO
    sysctls:
      - fs.mqueue.msg_max=10000
    ulimits:
      rtprio: 99
    cap_add:
      - SYS_NICE
    depends_on:
      - nos-engine-server
      - truth42sim
      - gps-sim
      - thermal-cam-sim

networks:
  nos3:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.41.0/24
          gateway: 192.168.41.1
