name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule init
          git config --file .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}' | while read mod; do
            git submodule update --depth=1 -- "$mod" || echo "SKIP: $mod"
          done
          test -f cfe/CMakeLists.txt && echo "cfe OK" || exit 1
          test -f osal/CMakeLists.txt && echo "osal OK" || exit 1
          test -f psp/CMakeLists.txt && echo "psp OK" || exit 1

      - name: Stub missing submodule CMakeLists
        run: |
          for dir in apps/ci_lab apps/to_lab apps/sch_lab apps/sample_app libs/sample_lib libs/cf; do
            if [ ! -f "$dir/CMakeLists.txt" ]; then
              mkdir -p "$dir"
              echo "project(stub)" > "$dir/CMakeLists.txt"
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
