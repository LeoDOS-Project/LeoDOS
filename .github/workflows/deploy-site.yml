name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'crates/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init cFS submodules
        run: git submodule update --init --depth=1 cfe osal psp tools/elf2cfetbl

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Build Docker image
        run: docker compose build cfs-build

      - name: Prep cFS headers
        run: docker compose run --rm cfs-build bash -c "make SIMULATION=native prep"

      - name: Build rustdoc (leodos-protocols with all features)
        run: |
          docker compose run --rm cfs-build \
            cargo doc --manifest-path crates/leodos-protocols/Cargo.toml \
            --features=cfs,tokio --no-deps

      - name: Build rustdoc (leodos-libcfs)
        run: |
          docker compose run --rm cfs-build \
            cargo doc --manifest-path crates/leodos-libcfs/Cargo.toml \
            --no-deps --all-features

      - name: Copy rustdoc into site build
        run: |
          mkdir -p site/build/rustdoc
          cp -r crates/leodos-protocols/target/doc/* site/build/rustdoc/
          cp -r crates/leodos-libcfs/target/doc/* site/build/rustdoc/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
